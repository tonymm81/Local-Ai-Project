version: "3.9"

services:
  # -------------------------------
  # OLLAMA DAEMON (QWEN BACKEND)
  # -------------------------------
  ollama-qwen-backend:
    image: ollama/ollama:latest
    container_name: ollama-qwen-backend
    gpus: all
    restart: unless-stopped
    ports:
      - "11439:11434"   # daemon API ulos
    volumes:
      - /data/ai-agent3/ollama/models:/root/.ollama/models:rw
      - /data/ai-agent3/ollama/data:/root/.ollama:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------
  # FASTAPI CONTROLLER
  # -------------------------------
  ollama-qwen:
    build:
      context: /data/ai-agent3/app
      dockerfile: /data/ai-agent3/app/Dockerfile
    image: local/ollama-qwen:latest
    container_name: ollama-qwen
    gpus: all
    restart: unless-stopped
    ports:
      - "11440:11436"   # controller API ulos
    volumes:
      - /data/ai-agent3/app:/app:ro
      - /data/ai-agent3/ollama/data:/root/.ollama:rw
    environment:
      - DATABASE_PATH=/root/.ollama/ollama.db
      - QWEN_URL=http://ollama-qwen-backend:11434
    depends_on:
      - ollama-qwen-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:11436/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: ai-net
